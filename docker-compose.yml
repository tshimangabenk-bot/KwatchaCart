# Local production-like run: builds the single-service image and persists the
# SQLite database in a named volume.
#
#   docker compose up --build
#   open http://localhost:4000
#
# Copy .env.example to .env and fill in real values before going to production.
services:
  kwatchacart:
    build: .
    ports:
      - '4000:4000'
    environment:
      PORT: 4000
      SERVE_WEB: 'true'
      DATABASE_PATH: /data/kwatchacart.sqlite
      # Point links at your public origin (same origin serves the SPA).
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:4000}
      WEB_BASE_URL: ${WEB_BASE_URL:-http://localhost:4000}
      # Secrets — set these in .env for anything beyond local testing.
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-dev-insecure-jwt-secret-change-me}
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET:-change-me-payment-secret}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-mock}
      # WhatsApp Cloud API (leave empty to run in console mode).
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-kwatchacart-verify}
    volumes:
      - kwatchacart-data:/data
    restart: unless-stopped

volumes:
  kwatchacart-data:
