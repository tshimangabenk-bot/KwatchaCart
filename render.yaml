# Render.com blueprint — one-click deploy of the single-service app.
# In the Render dashboard: New > Blueprint, point at this repo.
# Then set the secret env vars (marked sync:false) in the dashboard.
services:
  - type: web
    name: kwatchacart
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: SERVE_WEB
        value: 'true'
      - key: DATABASE_PATH
        value: /data/kwatchacart.sqlite
      # Set these to your Render URL, e.g. https://kwatchacart.onrender.com
      - key: PUBLIC_BASE_URL
        sync: false
      - key: WEB_BASE_URL
        sync: false
      # Secrets — set in the dashboard.
      - key: AUTH_JWT_SECRET
        generateValue: true
      - key: PAYMENT_WEBHOOK_SECRET
        generateValue: true
      - key: PAYMENT_PROVIDER
        value: mock
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
    disk:
      name: kwatchacart-data
      mountPath: /data
      sizeGB: 1
